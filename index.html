<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar del Nàutic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <h1>Bar del Nàutic</h1>

        <button id="darkModeBtn" class="dark-toggle">Mode fosc</button>

        <div class="form-section">
            <input type="text" id="nombreInput" placeholder="Nom del client">
            <input type="number" id="copasInput" value="10" min="0">
            <button id="addBtn">Afegir client</button>
        </div>

        <input type="text" id="searchInput" placeholder="Cercar client per nom...">

        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Copes restants</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody id="clientesTable"></tbody>
        </table>
    </div>

   <script type="module" src="app.js?v=3"></script>
</body>
</html>
