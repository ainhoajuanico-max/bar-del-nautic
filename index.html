<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <title>Bar del Nàutic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f4f7fb;
            color: #222;
            margin: 0;
            padding: 20px;
        }

        body.dark-mode {
            background: #0b1220;
            color: #f9fafb;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5f5;
        }

        .action-btn {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #e5edff;
        }
    </style>
</head>

<body>
    <h1>Bar del Nàutic</h1>

    <div class="controls">
        <input id="nombreInput" type="text" placeholder="Nom del client" />
        <input id="copasInput" type="number" value="10" min="0" />
        <button id="addBtn" class="action-btn">Afegir client</button>

        <input id="searchInput" type="text" placeholder="Cercar client..." />
        <button id="darkModeBtn" class="action-btn">Mode fosc</button>

        <!-- ⭐ AQUI ESTÀ EL BOTÓ QUE NO VEIES ⭐ -->
        <button id="exportBtn" class="action-btn">Exportar historial a Excel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Copes</th>
                <th>Accions</th>
            </tr>
        </thead>
        <tbody id="clientesTable"></tbody>
    </table>

    <script type="module" src="app.js?v=13"></script>
</body>
</html>
