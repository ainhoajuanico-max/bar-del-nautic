<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <title>Bar del Nàutic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            font-family: system-ui, sans-serif;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            color: #003049;
        }

        body.dark-mode {
            background: url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21') no-repeat center center fixed;
            background-size: cover;
            color: #f1f1f1;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(255, 255, 255, 0.85);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }

        body.dark-mode .container {
            background: rgba(0, 0, 0, 0.55);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Inputs i botons normals */
        input, .action-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #aac4ff;
            font-size: 16px;
        }

        .action-btn {
            background: #0077b6;
            color: white;
            border: none;
            cursor: pointer;
        }

        .action-btn:hover {
            background: #023e8a;
        }

        /* ⭐ BOTÓ -1 (groc) */
        .consume-btn {
            background: #ffdd57;
            color: #000;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            display: inline-block;
            margin-right: 6px;
            font-size: 14px;
        }

        .consume-btn:hover {
            background: #f4c430;
        }

        /* ⭐ BOTÓ ELIMINAR (vermell) */
        .delete-btn {
            background: #d62828;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            display: inline-block;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #a4161a;
        }

        /* ⭐ Taula compacta i alineada */
        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        body.dark-mode table {
            background: #1a1a1a;
        }

        th, td {
            padding: 6px 8px;
            line-height: 1.1;
            font-size: 15px;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }

        th {
            background: #caf0f8;
        }

        body.dark-mode th {
            background: #333;
        }

        /* Evitar que la cel·la d'accions s'estiri massa */
        td:last-child {
            white-space: nowrap;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Bar del Nàutic</h1>

        <input id="nombreInput" type="text" placeholder="Nom del client" />
        <input id="copasInput" type="number" value="10" min="0" />

        <button id="addBtn" class="action-btn">Afegir client</button>

        <input id="searchInput" type="text" placeholder="Cercar client..." />

        <div class="btn-row">
            <button id="darkModeBtn" class="action-btn">Mode fosc</button>
            <button id="exportBtn" class="action-btn">Exportar historial</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Copes</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody id="clientesTable"></tbody>
        </table>
    </div>

    <script type="module" src="app.js?v=25"></script>
</body>
</html>
